name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          cp jenkins-cli dist/jenkins-cli
          cp install.sh dist/install.sh
          cp README.md dist/README.md
          cp LICENSE dist/LICENSE
          chmod +x dist/jenkins-cli dist/install.sh

          tar -C dist -czf "dist/jenkins-cli-${VERSION}.tar.gz" jenkins-cli install.sh README.md LICENSE
          zip -j "dist/jenkins-cli-${VERSION}.zip" dist/jenkins-cli dist/install.sh dist/README.md dist/LICENSE

          (
            cd dist
            sha256sum "jenkins-cli-${VERSION}.tar.gz" "jenkins-cli-${VERSION}.zip" jenkins-cli install.sh > SHA256SUMS
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-cli-${{ github.ref_name }}
          path: dist/

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/jenkins-cli
            dist/install.sh
            dist/jenkins-cli-${{ github.ref_name }}.tar.gz
            dist/jenkins-cli-${{ github.ref_name }}.zip
            dist/SHA256SUMS
